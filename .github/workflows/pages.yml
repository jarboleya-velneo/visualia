name: Publicar dashboard en GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "dashboard/**"
      - "hub/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configurar Pages
        uses: actions/configure-pages@v5
      - name: Montar el sitio (dashboard en raíz + v2 + hub)
        run: |
          mkdir -p _site/hub _site/v2
          cp dashboard/index.html _site/index.html
          cp dashboard/v2/index.html _site/v2/index.html
          cp hub/index.html _site/hub/index.html
      - name: Subir el sitio
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Desplegar
        id: deployment
        uses: actions/deploy-pages@v4
